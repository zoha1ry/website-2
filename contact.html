<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portfolio-theme.css">
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: minmax(160px, 280px) 1fr;
      gap: clamp(24px, 5vw, 48px);
      align-items: start;
      margin-bottom: clamp(36px, 6vw, 56px);
    }
 
    .contact-label {
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }
 
    .contact-blurb {
      font-family: var(--mono);
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin: 0 0 clamp(28px, 4vw, 40px);
    }
 
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
 
    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-top: 2px dotted color-mix(in srgb, var(--text) 18%, transparent);
      padding-top: 16px;
    }
 
    .contact-row:last-child {
      border-bottom: 2px dotted color-mix(in srgb, var(--text) 18%, transparent);
      padding-bottom: 16px;
    }
 
    .contact-row-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: lowercase;
      min-width: 80px;
      flex-shrink: 0;
    }
 
    .contact-row-value {
      font-size: 0.9375rem;
      font-weight: 600;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--text);
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s ease;
    }
 
    .contact-row-value:hover {
      border-bottom-color: var(--text);
    }
 
    @media (max-width: 720px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <a class="nav-pill" href="index.html">home</a>
      <a class="nav-pill" href="contact.html" aria-current="page">contact me</a>
      <button type="button" class="theme-dot" id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false" title="Theme"></button>
    </header>
 
    <main>
      <a href="index.html" class="back-btn">home</a>
      <div class="contact-grid">
        <div class="contact-label">get in touch.</div>
        <div>
          <p class="contact-blurb">feel free to connect. i'm open to exploring new ideas and bringing them to life.</p>
 
          <div class="contact-links">
            <div class="contact-row">
              <span class="contact-row-label">email</span>
              <a class="contact-row-value" href="mailto:zohairspersonal@gmail.com">zohairspersonal@gmail.com</a>
            </div>
            <div class="contact-row">
              <span class="contact-row-label">letterboxd</span>
              <a class="contact-row-value" href="https://letterboxd.com/zohairy/" target="_blank" rel="noopener noreferrer">letterboxd.com/zohairy</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
 
  <footer class="site-footer">
    <div class="inner">
      <span>copyright @ 2026, zohair khan</span>
      <span><a href="mailto:zohairspersonal@gmail.com">zohairspersonal@gmail.com</a></span>
      <div class="footer-social" aria-label="Social">
        <a href="https://letterboxd.com/zohairy/" target="_blank" rel="noopener noreferrer">lb</a>
      </div>
    </div>
  </footer>
 
  <script src="portfolio-theme.js" defer></script>
</body>
</html>
